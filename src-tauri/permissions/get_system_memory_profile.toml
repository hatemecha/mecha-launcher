# Allows reading the system memory profile used to suggest a reasonable RAM allocation.

[[permission]]
identifier = "allow-get-system-memory-profile"
description = "Enables the get_system_memory_profile command without any pre-configured scope."
commands.allow = ["get_system_memory_profile"]

[[permission]]
identifier = "deny-get-system-memory-profile"
description = "Denies the get_system_memory_profile command without any pre-configured scope."
commands.deny = ["get_system_memory_profile"]
